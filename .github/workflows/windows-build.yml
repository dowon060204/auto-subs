name: Build AutoSubs for Windows
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query: latest
          vulkan-use-cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        working-directory: ./AutoSubs-App
        run: npm install

      - name: Download ffmpeg binaries for Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries
          gh release download --repo tmoroney/ffmpeg-binaries --pattern "ffmpeg-x86_64-pc-windows-msvc.zip"
          Expand-Archive "ffmpeg-x86_64-pc-windows-msvc.zip" -DestinationPath .

      - name: Build Tauri EXE
        working-directory: ./AutoSubs-App
        run: npm run build:win

      - name: Upload EXE File
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubs-Windows-Executable
          path: AutoSubs-App/src-tauri/target/release/bundle/nsis/*.exe
